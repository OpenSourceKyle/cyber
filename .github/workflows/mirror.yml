name: Auto Mirror Public Repo

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  workflows: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    # KILL SWITCH: This job only runs if the repository is NOT the source.
    if: github.repository != 'OpenSourceKyle/cyber'
    
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: OpenSourceKyle/cyber
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Push to mirror repository
        id: mirror_push
        env:
          TARGET_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          git remote set-url origin "$TARGET_REPO"
          PUSH_OUTPUT="$(git push --mirror --force origin 2>&1)"
          echo "$PUSH_OUTPUT"

          if [[ "$PUSH_OUTPUT" == *"Everything up-to-date"* ]]; then
            echo "mirror_updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "mirror_updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy workflow
        if: steps.mirror_push.outputs.mirror_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref":"main"}'
